<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FenMeat Supplier Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --royal-blue: #003CFF;
    --royal-blue-dark: #0030CC;
    --charcoal: #1F2937;
    --silver: #D1D5DB;
    --platinum: #F4F4F5;
    --white: #FFFFFF;
    --green: #16A34A;
    --amber: #D97706;
    --red: #DC2626;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--white);
    color: var(--charcoal);
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    height: 100%;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--white);
  }

  /* ---------- Header ---------- */
  header {
    padding: 18px 20px 14px;
    background: var(--charcoal);
    color: var(--white);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 2px;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.5px;
  }
  .brand .fen { color: var(--royal-blue); }
  .brand .meat { color: var(--white); }
  .brand-sub {
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--silver);
    margin-top: 2px;
    text-transform: uppercase;
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .today-date {
    font-size: 13px;
    color: var(--silver);
    font-weight: 500;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--white);
    font-size: 15px;
    font-weight: 600;
    padding: 6px 0;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .back-btn svg { width: 18px; height: 18px; }

  /* ---------- Main content ---------- */
  main {
    flex: 1;
    padding: 20px;
    padding-bottom: 100px;
  }

  .section-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--charcoal);
    opacity: 0.55;
    margin: 22px 0 10px;
  }
  .section-label:first-child { margin-top: 0; }

  /* ---------- Supplier cards ---------- */
  .supplier-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--platinum);
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform 0.08s ease, border-color 0.15s ease;
  }
  .supplier-card:active { transform: scale(0.98); }

  .supplier-card.due {
    background: #EAF0FF;
    border-color: var(--royal-blue);
  }

  .supplier-card.quiet {
    opacity: 0.55;
  }

  .supplier-info { display: flex; flex-direction: column; gap: 3px; }
  .supplier-name { font-size: 17px; font-weight: 600; color: var(--charcoal); }
  .supplier-meta { font-size: 12.5px; color: var(--charcoal); opacity: 0.65; }

  .due-tag {
    background: var(--royal-blue);
    color: var(--white);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.4px;
    padding: 5px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .chevron { color: var(--charcoal); opacity: 0.35; }

  /* ---------- Stock count rows ---------- */
  .material-row {
    background: var(--platinum);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .material-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .material-name { font-size: 15.5px; font-weight: 600; color: var(--charcoal); line-height: 1.3; }
  .material-cat {
    font-size: 11px;
    color: var(--royal-blue);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-top: 2px;
  }

  .material-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .field-block { display: flex; flex-direction: column; gap: 4px; }
  .field-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--charcoal);
    opacity: 0.55;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .qty-input, .price-input {
    width: 100%;
    border: 2px solid var(--silver);
    border-radius: 10px;
    background: var(--white);
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    color: var(--charcoal);
    padding: 10px 10px;
    font-size: 17px;
    text-align: left;
  }
  .qty-input:focus, .price-input:focus {
    outline: none;
    border-color: var(--royal-blue);
  }
  .price-input { font-size: 15px; }
  .price-input::before { content: 'R'; }

  .price-wrap { position: relative; }
  .price-wrap .currency-r {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    font-weight: 600;
    color: var(--charcoal);
    opacity: 0.5;
    pointer-events: none;
  }
  .price-wrap .price-input { padding-left: 24px; }

  .unit-hint {
    font-size: 12px;
    color: var(--charcoal);
    opacity: 0.5;
    margin-top: 2px;
  }

  /* ---------- Needs Calculator ---------- */
  .window-banner {
    background: #EAF0FF;
    border: 2px solid var(--royal-blue);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  .window-banner-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--royal-blue);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }
  .window-banner-dates {
    font-size: 15px;
    font-weight: 600;
    color: var(--charcoal);
  }

  .needs-row {
    background: var(--platinum);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .needs-row.manual {
    background: #FFF7ED;
  }
  .needs-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .manual-tag {
    background: var(--amber);
    color: var(--white);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
    padding: 4px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .needs-fields {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .needs-readonly {
    font-size: 16px;
    font-weight: 600;
    color: var(--charcoal);
    padding: 10px 0 0;
  }
  .needs-readonly.dim { opacity: 0.4; font-weight: 500; font-size: 14px; }
  .order-qty-input {
    width: 100%;
    border: 2px solid var(--royal-blue);
    border-radius: 10px;
    background: var(--white);
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    color: var(--royal-blue);
    padding: 10px 10px;
    font-size: 17px;
  }
  .order-qty-input:focus { outline: none; border-color: var(--royal-blue-dark); }

  /* ---------- Purchase Order screen ---------- */
  .po-banner {
    background: var(--charcoal);
    color: var(--white);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 16px;
  }
  .po-number {
    font-size: 12px;
    font-weight: 700;
    color: var(--silver);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .po-total {
    font-size: 28px;
    font-weight: 700;
    color: var(--white);
    margin-top: 4px;
  }
  .po-total-label { font-size: 12px; color: var(--silver); font-weight: 500; }

  .po-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--silver);
  }
  .po-line:last-child { border-bottom: none; }
  .po-line-name { font-size: 14.5px; font-weight: 600; color: var(--charcoal); }
  .po-line-qty { font-size: 12.5px; color: var(--charcoal); opacity: 0.6; margin-top: 2px; }
  .po-line-value { font-size: 15px; font-weight: 700; color: var(--charcoal); white-space: nowrap; }

  .contact-card {
    background: var(--platinum);
    border-radius: 14px;
    padding: 16px 18px;
    margin: 18px 0;
  }
  .contact-fields { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
  .contact-input {
    width: 100%;
    border: 2px solid var(--silver);
    border-radius: 10px;
    background: var(--white);
    font-family: 'Poppins', sans-serif;
    font-weight: 500;
    color: var(--charcoal);
    padding: 10px 12px;
    font-size: 15px;
  }
  .contact-input:focus { outline: none; border-color: var(--royal-blue); }
  .save-contact-btn {
    background: var(--charcoal);
    color: var(--white);
    border: none;
    border-radius: 10px;
    padding: 10px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    cursor: pointer;
    margin-top: 4px;
  }

  .send-buttons { display: flex; flex-direction: column; gap: 10px; }
  .send-btn {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-family: 'Poppins', sans-serif;
    font-size: 15.5px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .send-btn.whatsapp { background: #25D366; color: var(--white); }
  .send-btn.email { background: var(--royal-blue); color: var(--white); }
  .send-btn:disabled { opacity: 0.4; cursor: default; }
  .send-hint { font-size: 12px; color: var(--charcoal); opacity: 0.55; margin-top: 6px; text-align: center; }
  .status-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--green);
    color: var(--white);
    margin-top: 8px;
  }

  /* ---------- Supplier Notes ---------- */
  .note-input {
    width: 100%;
    border: 2px solid var(--silver);
    border-radius: 10px;
    background: var(--white);
    font-family: 'Poppins', sans-serif;
    font-weight: 500;
    color: var(--charcoal);
    padding: 10px 12px;
    font-size: 14.5px;
    resize: vertical;
    min-height: 60px;
  }
  .note-input:focus { outline: none; border-color: var(--royal-blue); }
  .add-note-btn {
    background: var(--royal-blue);
    color: var(--white);
    border: none;
    border-radius: 10px;
    padding: 10px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    cursor: pointer;
    margin-top: 8px;
    width: 100%;
  }
  .note-item {
    background: var(--platinum);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .note-item-text { font-size: 14px; color: var(--charcoal); line-height: 1.4; }
  .note-item-meta {
    font-size: 11px;
    color: var(--charcoal);
    opacity: 0.5;
    margin-top: 6px;
    font-weight: 500;
  }

  /* ---------- Invoice Check ---------- */
  .check-invoice-btn {
    width: 100%;
    background: var(--white);
    color: var(--royal-blue);
    border: 2px solid var(--royal-blue);
    border-radius: 14px;
    padding: 14px;
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin: 18px 0;
  }

  .photo-capture-btn {
    width: 100%;
    background: var(--charcoal);
    color: var(--white);
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .photo-preview {
    width: 100%;
    border-radius: 14px;
    margin: 12px 0;
    display: block;
  }
  .photo-status {
    font-size: 13px;
    text-align: center;
    color: var(--charcoal);
    opacity: 0.6;
    margin: 8px 0 4px;
  }

  .compare-row {
    background: var(--platinum);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border-left: 5px solid var(--silver);
  }
  .compare-row.status-match { border-left-color: var(--green); }
  .compare-row.status-qty, .compare-row.status-price, .compare-row.status-both { border-left-color: var(--amber); }
  .compare-row.status-missing { border-left-color: var(--red); }
  .compare-row.status-extra { border-left-color: var(--royal-blue); }

  .compare-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .compare-po-info { font-size: 12px; color: var(--charcoal); opacity: 0.6; margin-top: 2px; }
  .status-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 10px;
    color: var(--white);
    white-space: nowrap;
  }
  .status-badge.match { background: var(--green); }
  .status-badge.qty, .status-badge.price, .status-badge.both { background: var(--amber); }
  .status-badge.missing { background: var(--red); }
  .status-badge.extra { background: var(--royal-blue); }

  .compare-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .compare-input {
    width: 100%;
    border: 2px solid var(--silver);
    border-radius: 10px;
    background: var(--white);
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    color: var(--charcoal);
    padding: 9px 10px;
    font-size: 15px;
  }
  .compare-input:focus { outline: none; border-color: var(--royal-blue); }

  .add-extra-btn {
    width: 100%;
    background: none;
    border: 2px dashed var(--silver);
    border-radius: 14px;
    padding: 12px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--charcoal);
    opacity: 0.7;
    cursor: pointer;
    margin-bottom: 14px;
  }

  .summary-banner {
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 16px;
    text-align: center;
    font-weight: 700;
    font-size: 15px;
  }
  .summary-banner.ok { background: #ECFDF3; color: var(--green); border: 2px solid var(--green); }
  .summary-banner.diff { background: #FEF3E7; color: var(--amber); border: 2px solid var(--amber); }

  /* ---------- Bottom action bar ---------- */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-width: 480px;
    margin: 0 auto;
    background: var(--white);
    border-top: 1px solid var(--silver);
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    z-index: 20;
  }

  .save-btn {
    width: 100%;
    background: var(--royal-blue);
    color: var(--white);
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'Poppins', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .save-btn:active { background: var(--royal-blue-dark); }
  .save-btn:disabled { opacity: 0.5; cursor: default; }

  /* ---------- States ---------- */
  .loading, .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--charcoal);
    opacity: 0.55;
    font-size: 15px;
  }

  .toast {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: var(--white);
    font-weight: 600;
    font-size: 14px;
    padding: 12px 20px;
    border-radius: 30px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    z-index: 100;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.error { background: var(--red); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(6px); }

  .price-updated-badge {
    font-size: 10.5px;
    color: var(--green);
    font-weight: 700;
    margin-top: 4px;
    display: none;
  }
  .price-updated-badge.show { display: block; }

  #screen-stockcount { display: none; }
</style>
</head>
<body>

<div id="app">

  <!-- ===================== SUPPLIER PICKER SCREEN ===================== -->
  <div id="screen-suppliers">
    <header>
      <div class="header-row">
        <div>
          <div class="brand"><span class="fen">Fen</span><span class="meat">Meat</span></div>
          <div class="brand-sub">Supplier Orders</div>
        </div>
        <div class="today-date" id="today-date-label"></div>
      </div>
    </header>
    <main>
      <div id="suppliers-content" class="loading">Loading suppliers…</div>
    </main>
  </div>

  <!-- ===================== STOCK COUNT SCREEN ===================== -->
  <div id="screen-stockcount">
    <header>
      <button class="back-btn" id="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        Suppliers
      </button>
      <div class="header-row" style="margin-top:6px;">
        <div>
          <div class="brand" style="font-size:19px;"><span id="sc-supplier-name">—</span></div>
          <div class="brand-sub" style="text-transform:none; letter-spacing:0.3px;">Stock Count</div>
        </div>
        <div class="today-date" id="sc-date-label"></div>
      </div>
    </header>
    <main>
      <div id="stockcount-content" class="loading">Loading raw materials…</div>
    </main>
    <div class="bottom-bar">
      <button class="save-btn" id="save-btn">Save Count</button>
    </div>
  </div>

  <!-- ===================== NEEDS CALCULATOR SCREEN ===================== -->
  <div id="screen-needs">
    <header>
      <button class="back-btn" id="back-btn-needs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        Stock Count
      </button>
      <div class="header-row" style="margin-top:6px;">
        <div>
          <div class="brand" style="font-size:19px;"><span id="needs-supplier-name">—</span></div>
          <div class="brand-sub" style="text-transform:none; letter-spacing:0.3px;">Needs Calculator</div>
        </div>
      </div>
    </header>
    <main>
      <div id="needs-content" class="loading">Calculating…</div>
    </main>
    <div class="bottom-bar">
      <button class="save-btn" id="save-order-btn">Save Order Plan</button>
    </div>
  </div>

  <!-- ===================== PURCHASE ORDER SCREEN ===================== -->
  <div id="screen-po">
    <header>
      <button class="back-btn" id="back-btn-po">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        Needs Calculator
      </button>
      <div class="header-row" style="margin-top:6px;">
        <div>
          <div class="brand" style="font-size:19px;"><span id="po-supplier-name">—</span></div>
          <div class="brand-sub" style="text-transform:none; letter-spacing:0.3px;">Purchase Order</div>
        </div>
      </div>
    </header>
    <main>
      <div id="po-content" class="loading">Building purchase order…</div>
    </main>
  </div>

  <!-- ===================== INVOICE CHECK SCREEN ===================== -->
  <div id="screen-invoice">
    <header>
      <button class="back-btn" id="back-btn-invoice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        Purchase Order
      </button>
      <div class="header-row" style="margin-top:6px;">
        <div>
          <div class="brand" style="font-size:19px;">Invoice Check</div>
          <div class="brand-sub" style="text-transform:none; letter-spacing:0.3px;" id="invoice-po-label">—</div>
        </div>
      </div>
    </header>
    <main>
      <div id="invoice-content" class="loading">Loading…</div>
    </main>
    <div class="bottom-bar">
      <button class="save-btn" id="compare-btn">Compare Invoice</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzOvHW0qLnNQUP_kgImFdAXNcU7SMDsA6vYOFfeyyuBrs7j4MOrtWBgvoMv8Wba_A1yYw/exec';

  // ---------- Date helpers (GMT+2, matches Apps Script backend) ----------
  function todayISO() {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'Africa/Johannesburg', year: 'numeric', month: '2-digit', day: '2-digit'
    }).formatToParts(new Date());
    const map = {};
    parts.forEach(p => map[p.type] = p.value);
    return `${map.year}-${map.month}-${map.day}`;
  }
  function todayDisplay() {
    return new Date().toLocaleDateString('en-GB', {
      timeZone: 'Africa/Johannesburg', weekday: 'short', day: 'numeric', month: 'short'
    });
  }

  // ---------- Network helpers ----------
  async function apiGet(action, params) {
    const url = new URL(SCRIPT_URL);
    url.searchParams.set('action', action);
    Object.keys(params || {}).forEach(k => url.searchParams.set(k, params[k]));
    const res = await fetch(url.toString());
    return res.json();
  }
  async function apiPost(action, body) {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action, ...body })
    });
    return res.json();
  }

  // ---------- Toast ----------
  let toastTimer;
  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.toggle('error', !!isError);
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
  }

  // ---------- State ----------
  let currentSupplier = null;
  let currentMaterials = [];
  let currentNeeds = [];
  let currentPO = null;
  let currentSupplierContact = { phone: '', email: '' };
  let suppliersMap = {};
  let invoicePhotoUrl = '';
  let invoiceRows = []; // {rmCode, name, poQty, poPrice, isExtra}

  // ---------- Screen switching ----------
  function showScreen(name) {
    const screens = ['suppliers', 'stockcount', 'needs', 'po', 'invoice'];
    screens.forEach(s => {
      const el = document.getElementById('screen-' + s);
      el.style.display = (s === name) ? 'flex' : 'none';
      el.style.flexDirection = 'column';
    });
    window.scrollTo(0, 0);
  }

  // ---------- Supplier Picker ----------
  async function loadSuppliers() {
    document.getElementById('today-date-label').textContent = todayDisplay();
    const contentEl = document.getElementById('suppliers-content');
    try {
      const data = await apiGet('getSuppliers');
      if (data.status !== 'ok') throw new Error(data.message || 'Failed to load suppliers');

      const due = data.suppliers.filter(s => s.dueToday);
      const notDue = data.suppliers.filter(s => !s.dueToday);

      suppliersMap = {};
      data.suppliers.forEach(s => { suppliersMap[s.name] = s; });

      let html = '';
      if (due.length > 0) {
        html += `<div class="section-label">Order today</div>`;
        due.forEach(s => { html += supplierCardHTML(s, true); });
      }
      html += `<div class="section-label">${due.length > 0 ? 'Other suppliers' : 'All suppliers'}</div>`;
      notDue.forEach(s => { html += supplierCardHTML(s, false); });

      contentEl.className = '';
      contentEl.innerHTML = html;

      document.querySelectorAll('.supplier-card').forEach(card => {
        card.addEventListener('click', () => openSupplier(card.dataset.name));
      });
    } catch (err) {
      contentEl.className = 'empty-state';
      contentEl.textContent = 'Could not load suppliers. Check your connection and try again.';
    }
  }

  function supplierCardHTML(s, isDue) {
    return `
      <div class="supplier-card ${isDue ? 'due' : 'quiet'}" data-name="${escapeHtml(s.name)}">
        <div class="supplier-info">
          <div class="supplier-name">${escapeHtml(s.name)}</div>
          <div class="supplier-meta">${escapeHtml(s.deliveryDays)} · ${escapeHtml(s.frequency)}</div>
        </div>
        ${isDue
          ? `<div class="due-tag">Order today</div>`
          : `<svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>`
        }
      </div>`;
  }

  function escapeHtml(str) {
    return String(str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // ---------- Stock Count ----------
  async function openSupplier(name) {
    currentSupplier = name;
    document.getElementById('sc-supplier-name').textContent = name;
    document.getElementById('sc-date-label').textContent = todayDisplay();
    showScreen('stockcount');

    const contentEl = document.getElementById('stockcount-content');
    contentEl.className = 'loading';
    contentEl.textContent = 'Loading raw materials…';

    try {
      const data = await apiGet('getSupplierRawMaterials', { supplier: name });
      if (data.status !== 'ok') throw new Error(data.message || 'Failed to load materials');

      currentMaterials = data.materials;

      if (currentMaterials.length === 0) {
        contentEl.className = 'empty-state';
        contentEl.textContent = 'No raw materials found for this supplier yet.';
        return;
      }

      contentEl.className = '';
      contentEl.innerHTML = currentMaterials.map((m, i) => materialRowHTML(m, i)).join('');
    } catch (err) {
      contentEl.className = 'empty-state';
      contentEl.textContent = 'Could not load raw materials. Check your connection and try again.';
    }
  }

  function materialRowHTML(m, idx) {
    return `
      <div class="material-row" data-idx="${idx}">
        <div class="material-top">
          <div>
            <div class="material-name">${escapeHtml(m.name)}</div>
            <div class="material-cat">${escapeHtml(m.category)}</div>
          </div>
        </div>
        <div class="material-fields">
          <div class="field-block">
            <div class="field-label">Qty counted</div>
            <input type="number" inputmode="decimal" class="qty-input" data-idx="${idx}" placeholder="0" min="0" step="any">
            <div class="unit-hint">${escapeHtml(m.unit)}${m.minStock ? ' · min stock ' + m.minStock : ''}</div>
          </div>
          <div class="field-block">
            <div class="field-label">Price / ${escapeHtml(m.unit)}</div>
            <div class="price-wrap">
              <span class="currency-r">R</span>
              <input type="number" inputmode="decimal" class="price-input" data-idx="${idx}" value="${m.currentPrice || ''}" step="0.01" min="0">
            </div>
            <div class="price-updated-badge" data-idx="${idx}">Price updated</div>
          </div>
        </div>
      </div>`;
  }

  // Flag a price row as changed (visual confirmation only — actual save happens on Save Count)
  document.addEventListener('input', (e) => {
    if (e.target.classList.contains('price-input')) {
      const idx = e.target.dataset.idx;
      const original = currentMaterials[idx] ? currentMaterials[idx].currentPrice : null;
      const badge = document.querySelector(`.price-updated-badge[data-idx="${idx}"]`);
      if (badge) {
        const changed = parseFloat(e.target.value) !== parseFloat(original);
        badge.classList.toggle('show', changed && e.target.value !== '');
      }
    }
  });

  async function saveStockCount() {
    if (!currentSupplier || currentMaterials.length === 0) return;

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const rows = currentMaterials.map((m, i) => {
      const qtyEl = document.querySelector(`.qty-input[data-idx="${i}"]`);
      const priceEl = document.querySelector(`.price-input[data-idx="${i}"]`);
      return {
        rmCode: m.rmCode,
        name: m.name,
        qtyCounted: qtyEl && qtyEl.value !== '' ? Number(qtyEl.value) : 0,
        price: priceEl && priceEl.value !== '' ? Number(priceEl.value) : ''
      };
    });

    try {
      const data = await apiPost('writeRawStockCount', {
        date: todayISO(),
        supplier: currentSupplier,
        rows
      });
      if (data.status !== 'ok') throw new Error(data.message || 'Save failed');

      showToast(`Saved · ${data.saved} items` + (data.pricesUpdated ? ` · ${data.pricesUpdated} prices updated` : ''));
      setTimeout(() => openNeedsCalculator(currentSupplier), 700);
    } catch (err) {
      showToast('Could not save. Try again.', true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Count';
    }
  }

  // ---------- Needs Calculator ----------
  function formatDateLabel(iso) {
    if (!iso) return '—';
    const d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  }

  async function openNeedsCalculator(name) {
    document.getElementById('needs-supplier-name').textContent = name;
    showScreen('needs');

    const contentEl = document.getElementById('needs-content');
    contentEl.className = 'loading';
    contentEl.textContent = 'Calculating…';

    try {
      const data = await apiGet('getRawMaterialNeeds', { supplier: name, date: todayISO() });
      if (data.status !== 'ok') throw new Error(data.message || 'Failed to calculate needs');

      currentNeeds = data.items;

      let html = `
        <div class="window-banner">
          <div class="window-banner-label">This order covers</div>
          <div class="window-banner-dates">${formatDateLabel(data.windowStart)} – ${formatDateLabel(data.windowEnd)}</div>
        </div>`;

      if (currentNeeds.length === 0) {
        contentEl.className = 'empty-state';
        contentEl.textContent = 'No raw materials found for this supplier yet.';
        return;
      }

      html += currentNeeds.map((item, i) => needsRowHTML(item, i)).join('');
      contentEl.className = '';
      contentEl.innerHTML = html;
    } catch (err) {
      contentEl.className = 'empty-state';
      contentEl.textContent = 'Could not calculate needs. Check your connection and try again.';
    }
  }

  function needsRowHTML(item, idx) {
    const manual = !item.hasRecipeLink;
    const defaultOrderQty = item.suggestedOrderQty != null ? item.suggestedOrderQty : '';
    return `
      <div class="needs-row ${manual ? 'manual' : ''}" data-idx="${idx}">
        <div class="needs-top">
          <div class="material-name">${escapeHtml(item.name)}</div>
          ${manual ? `<div class="manual-tag">Manual entry</div>` : ''}
        </div>
        <div class="needs-fields">
          <div class="field-block">
            <div class="field-label">Forecast need</div>
            <div class="needs-readonly ${manual ? 'dim' : ''}">${manual ? 'No recipe link' : (item.forecastNeed + ' ' + item.unit)}</div>
          </div>
          <div class="field-block">
            <div class="field-label">Stock counted</div>
            <div class="needs-readonly ${manual ? 'dim' : ''}">${item.stockCounted != null ? (item.stockCounted + ' ' + item.unit) : '—'}</div>
          </div>
          <div class="field-block">
            <div class="field-label">Order qty</div>
            <input type="number" inputmode="decimal" class="order-qty-input" data-idx="${idx}" value="${defaultOrderQty}" placeholder="0" min="0" step="any">
          </div>
        </div>
      </div>`;
  }

  async function saveOrderPlan() {
    if (!currentSupplier || currentNeeds.length === 0) return;

    const btn = document.getElementById('save-order-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const rows = currentNeeds.map((item, i) => {
      const el = document.querySelector(`.order-qty-input[data-idx="${i}"]`);
      const orderQty = el && el.value !== '' ? Number(el.value) : 0;
      return {
        rmCode: item.rmCode,
        name: item.name,
        forecastNeed: item.forecastNeed,
        stockCounted: item.stockCounted,
        orderQty: orderQty
      };
    });

    try {
      const data = await apiPost('writeOrderPlan', {
        date: todayISO(),
        supplier: currentSupplier,
        rows
      });
      if (data.status !== 'ok') throw new Error(data.message || 'Save failed');

      showToast(`Order plan saved · ${data.saved} items`);
      setTimeout(() => openPurchaseOrder(currentSupplier), 700);
    } catch (err) {
      showToast('Could not save. Try again.', true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Order Plan';
    }
  }

  // ---------- Purchase Order ----------
  function toWhatsAppPhone(raw) {
    let digits = String(raw || '').replace(/\D/g, '');
    if (!digits) return '';
    if (digits.startsWith('0')) digits = '27' + digits.substring(1);
    return digits;
  }

  function buildPOMessage(po) {
    const lines = po.items.map(li => `- ${li.name}: ${li.qty} ${li.unit} @ R${li.price.toFixed(2)} = R${li.lineTotal.toFixed(2)}`);
    return `FenMeat Purchase Order ${po.poNumber}\nSupplier: ${po.supplier}\nDate: ${po.date}\n\nItems:\n${lines.join('\n')}\n\nTotal: R${po.total.toFixed(2)}`;
  }

  async function openPurchaseOrder(name) {
    document.getElementById('po-supplier-name').textContent = name;
    showScreen('po');

    const contentEl = document.getElementById('po-content');
    contentEl.className = 'loading';
    contentEl.textContent = 'Building purchase order…';

    const contact = suppliersMap[name] || {};
    currentSupplierContact = { phone: contact.contactPhone || '', email: contact.contactEmail || '' };

    try {
      const data = await apiPost('createPurchaseOrder', { date: todayISO(), supplier: name });
      if (data.status !== 'ok') throw new Error(data.message || 'Failed to build purchase order');

      currentPO = data;

      if (!currentPO.items || currentPO.items.length === 0) {
        contentEl.className = 'empty-state';
        contentEl.textContent = 'No items with an order quantity above 0 — nothing to order this time.';
        return;
      }

      contentEl.className = '';
      contentEl.innerHTML = poScreenHTML(currentPO);
      wirePOScreen();
    } catch (err) {
      contentEl.className = 'empty-state';
      contentEl.textContent = 'Could not build purchase order. Check your connection and try again.';
    }
  }

  function poScreenHTML(po) {
    const linesHTML = po.items.map(li => `
      <div class="po-line">
        <div>
          <div class="po-line-name">${escapeHtml(li.name)}</div>
          <div class="po-line-qty">${li.qty} ${escapeHtml(li.unit)} @ R${li.price.toFixed(2)}</div>
        </div>
        <div class="po-line-value">R${li.lineTotal.toFixed(2)}</div>
      </div>`).join('');

    const hasPhone = !!currentSupplierContact.phone;
    const hasEmail = !!currentSupplierContact.email;

    return `
      <div class="po-banner">
        <div class="po-number">${escapeHtml(po.poNumber)}</div>
        <div class="po-total-label">Total value</div>
        <div class="po-total">R${po.total.toFixed(2)}</div>
      </div>

      <div class="section-label">Line items</div>
      <div class="po-lines">${linesHTML}</div>

      <div class="contact-card">
        <div class="field-label">Supplier contact</div>
        <div class="contact-fields">
          <input type="tel" inputmode="tel" class="contact-input" id="contact-phone" placeholder="Phone (e.g. 082 123 4567)" value="${escapeHtml(currentSupplierContact.phone)}">
          <input type="email" class="contact-input" id="contact-email" placeholder="Email address" value="${escapeHtml(currentSupplierContact.email)}">
          <button class="save-contact-btn" id="save-contact-btn">Save Contact Details</button>
        </div>
      </div>

      <div class="section-label">Send this order</div>
      <div class="send-buttons">
        <button class="send-btn whatsapp" id="send-whatsapp-btn" ${hasPhone ? '' : 'disabled'}>Send via WhatsApp</button>
        <button class="send-btn email" id="send-email-btn" ${hasEmail ? '' : 'disabled'}>Send via Email</button>
      </div>
      <div class="send-hint">${(!hasPhone || !hasEmail) ? 'Add a phone number / email above to enable sending.' : 'Opens WhatsApp or your email app with the order pre-filled.'}</div>
      <div id="po-status-pill"></div>

      <div class="section-label">Supplier notes</div>
      <textarea class="note-input" id="new-note-input" placeholder="e.g. Salt is short, supplier said Tuesday instead"></textarea>
      <button class="add-note-btn" id="add-note-btn">Add Note</button>
      <div id="notes-list" style="margin-top:14px;"></div>

      <button class="check-invoice-btn" id="check-invoice-btn">Check Invoice Against This PO</button>
    `;
  }

  function wirePOScreen() {
    document.getElementById('save-contact-btn').addEventListener('click', saveSupplierContact);
    const waBtn = document.getElementById('send-whatsapp-btn');
    const emailBtn = document.getElementById('send-email-btn');
    if (waBtn) waBtn.addEventListener('click', () => sendPO('whatsapp'));
    if (emailBtn) emailBtn.addEventListener('click', () => sendPO('email'));
    document.getElementById('add-note-btn').addEventListener('click', addSupplierNote);
    document.getElementById('check-invoice-btn').addEventListener('click', () => openInvoiceCheck(currentPO));
    loadSupplierNotes();
  }

  function noteItemHTML(n) {
    const d = n.timestamp ? new Date(n.timestamp) : null;
    const when = d ? d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' · ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) : '';
    return `
      <div class="note-item">
        <div class="note-item-text">${escapeHtml(n.note)}</div>
        <div class="note-item-meta">${when}${n.poNumber ? ' · ' + escapeHtml(n.poNumber) : ''}</div>
      </div>`;
  }

  async function loadSupplierNotes() {
    const listEl = document.getElementById('notes-list');
    if (!listEl) return;
    listEl.innerHTML = '<div class="loading" style="padding:20px 0;">Loading notes…</div>';
    try {
      const data = await apiGet('getSupplierNotes', { supplier: currentSupplier });
      if (data.status !== 'ok') throw new Error(data.message);
      if (!data.notes || data.notes.length === 0) {
        listEl.innerHTML = '<div class="empty-state" style="padding:20px 0;">No notes yet for this supplier.</div>';
        return;
      }
      listEl.innerHTML = data.notes.map(noteItemHTML).join('');
    } catch (err) {
      listEl.innerHTML = '<div class="empty-state" style="padding:20px 0;">Could not load notes.</div>';
    }
  }

  async function addSupplierNote() {
    const input = document.getElementById('new-note-input');
    const note = input.value.trim();
    if (!note) return;

    const btn = document.getElementById('add-note-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const data = await apiPost('addSupplierNote', {
        supplier: currentSupplier,
        poNumber: currentPO ? currentPO.poNumber : '',
        note: note
      });
      if (data.status !== 'ok') throw new Error(data.message);
      input.value = '';
      showToast('Note added');
      loadSupplierNotes();
    } catch (err) {
      showToast('Could not save note.', true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Note';
    }
  }

  async function saveSupplierContact() {
    const phone = document.getElementById('contact-phone').value.trim();
    const email = document.getElementById('contact-email').value.trim();
    const btn = document.getElementById('save-contact-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      const data = await apiPost('updateSupplier', {
        originalName: currentSupplier,
        supplier: { contactPhone: phone, contactEmail: email }
      });
      if (data.status !== 'ok') throw new Error(data.message);
      currentSupplierContact = { phone, email };
      if (suppliersMap[currentSupplier]) {
        suppliersMap[currentSupplier].contactPhone = phone;
        suppliersMap[currentSupplier].contactEmail = email;
      }
      document.getElementById('send-whatsapp-btn').disabled = !phone;
      document.getElementById('send-email-btn').disabled = !email;
      showToast('Contact details saved');
    } catch (err) {
      showToast('Could not save contact details.', true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Contact Details';
    }
  }

  function sendPO(channel) {
    if (!currentPO) return;
    const message = buildPOMessage(currentPO);

    if (channel === 'whatsapp') {
      const phone = toWhatsAppPhone(currentSupplierContact.phone);
      if (!phone) { showToast('Add a phone number first.', true); return; }
      window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
    } else {
      const email = currentSupplierContact.email;
      if (!email) { showToast('Add an email address first.', true); return; }
      const subject = `FenMeat Purchase Order ${currentPO.poNumber}`;
      window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
    }

    apiPost('markPurchaseOrderSent', { poNumber: currentPO.poNumber, channel: channel }).catch(() => {});
    const pill = document.getElementById('po-status-pill');
    if (pill) pill.innerHTML = `<div class="status-pill">Sent via ${channel === 'whatsapp' ? 'WhatsApp' : 'Email'}</div>`;
  }

  // ---------- Invoice Check ----------
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function openInvoiceCheck(po) {
    if (!po) return;
    invoicePhotoUrl = '';
    invoiceRows = po.items.map(li => ({
      rmCode: li.rmCode, name: li.name, poQty: li.qty, poPrice: li.price, isExtra: false
    }));

    document.getElementById('invoice-po-label').textContent = po.poNumber;
    showScreen('invoice');
    renderInvoiceScreen();
  }

  function renderInvoiceScreen() {
    const contentEl = document.getElementById('invoice-content');
    contentEl.className = '';
    contentEl.innerHTML = `
      <input type="file" accept="image/*" capture="environment" id="invoice-photo-input" style="display:none;">
      <button class="photo-capture-btn" id="take-photo-btn">📷 Photograph Invoice</button>
      <div id="photo-preview-area"></div>

      <div class="section-label">Compare items</div>
      <div id="compare-rows">${invoiceRows.map((r, i) => compareRowHTML(r, i)).join('')}</div>
      <button class="add-extra-btn" id="add-extra-btn">+ Add item not on the PO</button>
      <div id="compare-results"></div>
    `;

    document.getElementById('take-photo-btn').addEventListener('click', () => {
      document.getElementById('invoice-photo-input').click();
    });
    document.getElementById('invoice-photo-input').addEventListener('change', handlePhotoSelected);
    document.getElementById('add-extra-btn').addEventListener('click', addExtraInvoiceRow);
  }

  function compareRowHTML(r, idx) {
    return `
      <div class="compare-row" data-idx="${idx}" id="compare-row-${idx}">
        <div class="compare-header">
          <div>
            <div class="material-name">${escapeHtml(r.name)}${r.isExtra ? '' : ''}</div>
            <div class="compare-po-info">${r.isExtra ? 'Not on original PO' : 'PO: ' + r.poQty + ' @ R' + r.poPrice.toFixed(2)}</div>
          </div>
        </div>
        <div class="compare-fields">
          <div class="field-block">
            <div class="field-label">Invoice qty</div>
            <input type="number" inputmode="decimal" class="compare-input inv-qty" data-idx="${idx}" placeholder="0" step="any">
          </div>
          <div class="field-block">
            <div class="field-label">Invoice price</div>
            <input type="number" inputmode="decimal" class="compare-input inv-price" data-idx="${idx}" placeholder="0.00" step="0.01">
          </div>
        </div>
      </div>`;
  }

  function addExtraInvoiceRow() {
    const name = prompt('Item name (as it appears on the invoice):');
    if (!name || !name.trim()) return;
    invoiceRows.push({ rmCode: '', name: name.trim(), poQty: 0, poPrice: 0, isExtra: true });
    document.getElementById('compare-rows').innerHTML = invoiceRows.map((r, i) => compareRowHTML(r, i)).join('');
  }

  async function handlePhotoSelected(e) {
    const file = e.target.files[0];
    if (!file) return;

    const previewArea = document.getElementById('photo-preview-area');
    previewArea.innerHTML = '<div class="photo-status">Uploading photo…</div>';

    try {
      const base64 = await fileToBase64(file);
      const data = await apiPost('uploadInvoicePhoto', {
        poNumber: currentPO.poNumber,
        supplier: currentSupplier,
        imageBase64: base64,
        mimeType: file.type || 'image/jpeg'
      });
      if (data.status !== 'ok') throw new Error(data.message);
      invoicePhotoUrl = data.fileUrl;
      previewArea.innerHTML = `
        <img class="photo-preview" src="${URL.createObjectURL(file)}" alt="Invoice photo">
        <div class="photo-status">✓ Saved to Drive</div>`;
    } catch (err) {
      previewArea.innerHTML = '<div class="photo-status">Could not upload photo. Try again.</div>';
    }
  }

  async function runInvoiceComparison() {
    const btn = document.getElementById('compare-btn');
    btn.disabled = true;
    btn.textContent = 'Comparing…';

    const items = invoiceRows.map((r, i) => {
      const qtyEl = document.querySelector(`.inv-qty[data-idx="${i}"]`);
      const priceEl = document.querySelector(`.inv-price[data-idx="${i}"]`);
      return {
        rmCode: r.rmCode,
        name: r.name,
        poQty: r.poQty,
        poPrice: r.poPrice,
        invoiceQty: qtyEl && qtyEl.value !== '' ? qtyEl.value : '',
        invoicePrice: priceEl && priceEl.value !== '' ? priceEl.value : '',
        isExtra: r.isExtra
      };
    });

    try {
      const data = await apiPost('compareInvoice', {
        poNumber: currentPO.poNumber,
        supplier: currentSupplier,
        date: todayISO(),
        invoicePhotoUrl: invoicePhotoUrl,
        invoiceItems: items
      });
      if (data.status !== 'ok') throw new Error(data.message);
      renderComparisonResults(data.items, data.hasDiscrepancy);
    } catch (err) {
      showToast('Could not compare invoice.', true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Compare Invoice';
    }
  }

  function statusClass(status) {
    return { MATCH: 'match', QTY_DIFF: 'qty', PRICE_DIFF: 'price', BOTH_DIFF: 'both',
      MISSING_ON_INVOICE: 'missing', EXTRA_ON_INVOICE: 'extra' }[status] || '';
  }
  function statusLabel(status) {
    return { MATCH: 'Match', QTY_DIFF: 'Qty differs', PRICE_DIFF: 'Price differs', BOTH_DIFF: 'Qty & price differ',
      MISSING_ON_INVOICE: 'Missing on invoice', EXTRA_ON_INVOICE: 'Extra on invoice' }[status] || status;
  }

  function renderComparisonResults(items, hasDiscrepancy) {
    const resultsEl = document.getElementById('compare-results');
    const banner = hasDiscrepancy
      ? `<div class="summary-banner diff">${items.filter(it => it.status !== 'MATCH').length} difference(s) found</div>`
      : `<div class="summary-banner ok">✓ Everything matches</div>`;

    const rows = items.map(it => `
      <div class="compare-row status-${statusClass(it.status)}">
        <div class="compare-header">
          <div>
            <div class="material-name">${escapeHtml(it.name)}</div>
            <div class="compare-po-info">
              ${it.status === 'EXTRA_ON_INVOICE' ? '' : 'PO: ' + it.poQty + ' @ R' + it.poPrice.toFixed(2) + ' &nbsp;·&nbsp; '}
              Invoice: ${it.invoiceQty != null ? it.invoiceQty : '—'} @ R${it.invoicePrice != null ? it.invoicePrice.toFixed(2) : '—'}
            </div>
          </div>
          <div class="status-badge ${statusClass(it.status)}">${statusLabel(it.status)}</div>
        </div>
      </div>`).join('');

    resultsEl.innerHTML = banner + rows;
    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ---------- Wire up ----------
  document.getElementById('back-btn').addEventListener('click', () => showScreen('suppliers'));
  document.getElementById('save-btn').addEventListener('click', saveStockCount);
  document.getElementById('back-btn-needs').addEventListener('click', () => showScreen('stockcount'));
  document.getElementById('save-order-btn').addEventListener('click', saveOrderPlan);
  document.getElementById('back-btn-po').addEventListener('click', () => showScreen('needs'));
  document.getElementById('back-btn-invoice').addEventListener('click', () => showScreen('po'));
  document.getElementById('compare-btn').addEventListener('click', runInvoiceComparison);

  // ---------- Init ----------
  showScreen('suppliers');
  loadSuppliers();
</script>

</body>
</html>
